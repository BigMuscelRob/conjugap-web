# Production Nginx config for conjugap.com
# Location on server: /etc/nginx/sites-enabled/conjugap
#
# Rate limit zones (add to /etc/nginx/nginx.conf inside http{} block):
#   limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/m;
#   limit_req_zone $binary_remote_addr zone=api_complete:10m rate=5r/m;

server {
    server_name conjugap.com www.conjugap.com;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Auth Endpoints — 5 Req/Min ────────────────────────────────────────────
    location /api/auth/ {
        limit_req zone=api_complete burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Practice Complete — 5 Req/Min ─────────────────────────────────────────
    location /api/practice/complete {
        limit_req zone=api_complete burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Alle anderen API Endpoints — 30 Req/Min ───────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Frontend ──────────────────────────────────────────────────────────────
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/conjugap.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/conjugap.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.conjugap.com) {
        return 301 https://$host$request_uri;
    }
    if ($host = conjugap.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name conjugap.com www.conjugap.com;
    return 404;
}
